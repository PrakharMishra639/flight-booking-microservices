version: '3.8'

services:
  # Infrastructure
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: My$ecure@123
      MYSQL_DATABASE: flight_booking_aero
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Backend Services
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=auth-service
    environment:
      - PORT=4001
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - JWT_SECRET=acc434007f186e60bd375b5be4114394cafe8bca6d410b3d1a298bd5e42121af34ea446bcd6d02df9ccf57d2fb56c90210d46d8a3e57650b29fb3d86c95a3007
    depends_on:
      - mysql
      - redis

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=user-service
    environment:
      - PORT=4002
      - DB_HOST=mysql
    depends_on:
      - mysql

  flight-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=flight-service
    environment:
      - PORT=4003
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - MONGODB_URI=mongodb://mongodb/flight_analytics
      - SEAT_SERVICE_URL=http://seat-service:4004
      - PRICING_SERVICE_URL=http://pricing-service:4006
    depends_on:
      - mysql
      - redis
      - mongodb

  seat-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=seat-service
    environment:
      - PORT=4004
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis

  booking-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=booking-service
    environment:
      - PORT=4005
      - DB_HOST=mysql
      - NOTIFICATION_SERVICE_URL=http://notification-service:4007
    depends_on:
      - mysql

  pricing-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=pricing-service
    environment:
      - PORT=4006
      - DB_HOST=mysql
    depends_on:
      - mysql

  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=notification-service
    environment:
      - PORT=4007
      - DB_HOST=mysql
    depends_on:
      - mysql

  analytics-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=analytics-service
    environment:
      - PORT=4008
      - DB_HOST=mysql
    depends_on:
      - mysql

  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
      args:
        - SERVICE_NAME=api-gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - FRONTEND_URL=http://localhost
      - AUTH_SERVICE_URL=http://auth-service:4001
      - USER_SERVICE_URL=http://user-service:4002
      - FLIGHT_SERVICE_URL=http://flight-service:4003
      - SEAT_SERVICE_URL=http://seat-service:4004
      - BOOKING_SERVICE_URL=http://booking-service:4005
      - PRICING_SERVICE_URL=http://pricing-service:4006
      - NOTIFICATION_SERVICE_URL=http://notification-service:4007
      - ANALYTICS_SERVICE_URL=http://analytics-service:4008
    depends_on:
      - auth-service
      - user-service
      - flight-service
      - seat-service
      - booking-service

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:4000/api
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data:
  redis_data:
  mongo_data:
