apiVersion: v1
kind: Service
metadata:
  name: flight-service
spec:
  ports:
    - port: 4003
  selector:
    app: flight-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-service
  template:
    metadata:
      labels:
        app: flight-service
    spec:
      containers:
        - name: flight-service
          image: flight-service:latest
          env:
            - name: PORT
              value: "4003"
            - name: DB_HOST
              value: "mysql"
            - name: REDIS_HOST
              value: "redis"
            - name: MONGODB_URI
              value: "mongodb://mongodb/flight_analytics"
            - name: SEAT_SERVICE_URL
              value: "http://seat-service:4004"
            - name: PRICING_SERVICE_URL
              value: "http://pricing-service:4006"
          ports:
            - containerPort: 4003
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flight-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flight-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
