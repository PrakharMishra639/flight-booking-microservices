apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          env:
            - name: PORT
              value: "4000"
            - name: FRONTEND_URL
              value: "http://localhost"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:4001"
            - name: USER_SERVICE_URL
              value: "http://user-service:4002"
            - name: FLIGHT_SERVICE_URL
              value: "http://flight-service:4003"
            - name: SEAT_SERVICE_URL
              value: "http://seat-service:4004"
            - name: BOOKING_SERVICE_URL
              value: "http://booking-service:4005"
            - name: PRICING_SERVICE_URL
              value: "http://pricing-service:4006"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:4007"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:4008"
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
