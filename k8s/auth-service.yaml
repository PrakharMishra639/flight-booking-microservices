apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  ports:
    - port: 4001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          env:
            - name: PORT
              value: "4001"
            - name: DB_HOST
              value: "mysql"
            - name: REDIS_HOST
              value: "redis"
            - name: JWT_SECRET
              value: "acc434007f186e60bd375b5be4114394cafe8bca6d410b3d1a298bd5e42121af34ea446bcd6d02df9ccf57d2fb56c90210d46d8a3e57650b29fb3d86c95a3007"
          ports:
            - containerPort: 4001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
